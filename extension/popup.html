<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 320px;
        font-family: system-ui, sans-serif;
        margin: 0;
        background: #151821;
        color: #e7e9ee;
        padding: 14px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      .sub {
        color: #969cad;
        font-size: 12px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #969cad;
        margin: 10px 0 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #1c2030;
        border: 1px solid #2a2f3e;
        color: #e7e9ee;
        border-radius: 6px;
        padding: 8px;
        font-size: 13px;
      }
      button {
        width: 100%;
        margin-top: 12px;
        background: #d62976;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 10px;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
      }
      button.secondary {
        background: #1c2030;
        border: 1px solid #2a2f3e;
      }
      #log {
        margin-top: 12px;
        font-size: 12px;
        white-space: pre-wrap;
        max-height: 160px;
        overflow: auto;
        background: #0b0d12;
        border: 1px solid #2a2f3e;
        border-radius: 6px;
        padding: 8px;
        min-height: 40px;
      }
      .warn {
        background: rgba(245, 197, 24, 0.12);
        border: 1px solid #f5c518;
        color: #f5c518;
        font-size: 11px;
        border-radius: 6px;
        padding: 8px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>🎬 Reel DM Manager</h1>
    <p class="sub">Run a DM pass on the reel open in this tab.</p>

    <label>Backend URL</label>
    <input id="backend" placeholder="http://localhost:3000" />

    <label>Extension token (EXTENSION_TOKEN)</label>
    <input id="token" type="password" placeholder="shared secret" />

    <button id="save" class="secondary">Save connection</button>
    <button id="run">Scan this reel &amp; send DMs</button>

    <div class="warn">
      Sends through your own logged-in session. Keep volumes low — Instagram
      flags bursty automated DMing.
    </div>

    <div id="log"></div>

    <script src="popup.js"></script>
  </body>
</html>
